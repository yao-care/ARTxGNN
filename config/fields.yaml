# Argentina ANMAT Field Mapping Configuration

country_code: "AR"
language: "es"
regulatory_agency: "ANMAT"

data_source:
  name: "Vademécum Nacional de Medicamentos - ANMAT"
  page_url: "https://datos.salud.gob.ar/dataset?groups=vademecum-y-medicamentos"
  format: CSV
  encoding: utf-8-sig
  dataset_id: "vademecun-nacional-de-medicamentos-vnm"
  note: >
    datos.salud.gob.ar CKAN API 提供 VNM 更新資料 (2018 年)，共約 60 筆。
    完整資料庫 (49,000+ 筆) 需透過 PAMI Vademécum 查詢介面手動取得。

  # CKAN API 端點 (會自動查詢並找到 CSV 資源)
  ckan_api_urls:
    - "https://datos.salud.gob.ar"
    - "https://datos.gob.ar"

  # 已知的直接下載 URL (2018-12 版本)
  direct_download_urls:
    - "https://datos.salud.gob.ar/dataset/3e28c31c-2bcf-4a74-81cf-f992152f9e6a/resource/9d5a5ee0-5942-428e-84ad-67f0a10091a3/download/vnm-2018.csv"
    - "https://datos.salud.gob.ar/dataset/3e28c31c-2bcf-4a74-81cf-f992152f9e6a/resource/7c95c566-e1fa-4ebc-a5b6-7a9f236a2f38/download/vnm-jun-2018-.csv"

field_mapping:
  # datos.salud.gob.ar VNM CSV 欄位 (標準化後的小寫名稱)
  license_id: "numero_certificado"
  brand_name_local: "nombre_comercial"
  brand_name_en: "nombre_generico"
  ingredients: "nombre_generico"
  indication: ""
  dosage_form: "forma_farmaceutica"
  manufacturer: "laboratorio_titular"
  approval_date: ""
  status: ""

withdrawn_statuses:
  - "Cancelado"
  - "Suspendido"
  - "Baja"

ingredient_separator: " - "
date_format: "%d/%m/%Y"
encoding: "utf-8-sig"
